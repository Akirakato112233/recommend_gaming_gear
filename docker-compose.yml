services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gaming_gear
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gaming_gear"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./apps/backend
      target: runner
    command:
      - sh
      - -c
      - uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-3001} --reload
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/gaming_gear
      APP_NAME: Recommend Gaming Gear API
      API_PREFIX: /api
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ./apps/backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
    environment:
      API_URL: http://backend:3001
      HOSTNAME: 0.0.0.0
      NODE_ENV: development
      PORT: 3000
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    command:
      - npm
      - run
      - dev
    depends_on:
      backend:
        condition: service_started

volumes:
  frontend_next_cache:
  frontend_node_modules:
  postgres_data:
