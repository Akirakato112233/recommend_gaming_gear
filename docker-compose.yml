services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gaming_gear
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gaming_gear"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./apps/backend
      target: runner
    command:
      - sh
      - -c
      - uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-3001} --reload
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/gaming_gear
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ./apps/backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
    environment:
      API_URL: http://backend:3001
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    depends_on:
      backend:
        condition: service_started

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next_cache:
  pgadmin_data:
